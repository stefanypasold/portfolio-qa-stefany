<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Milk's Coffee - Loja</title>
    <link rel="stylesheet" href="../pdv/style.css"> </head>
<body>
    <header>
        <h1>Milk's Coffee Store</h1>
        <div id="login-status"></div>
    </header>
    
    <main class="container">
        <h2>Nossa Vitrine</h2>
        <div id="vitrine" class="grid" data-testid="customer-vitrine">
            </div>
    </main>

    <script>
        async function carregarVitrine() {
            const res = await fetch('/api/estoque');
            const produtos = await res.json();
            
            // Filtro crucial: apenas visivel_cliente === 1
            const visiveis = produtos.filter(p => p.visivel_cliente == 1);
            
            const grid = document.getElementById('vitrine');
            grid.innerHTML = visiveis.map(p => `
                <div class="card" data-testid="customer-card-${p.id}">
                    <img src="/uploads/${p.imagem_url}" onerror="this.src='/img/default.png'">
                    <h4>${p.item}</h4>
                    <p>${p.descricao || ''}</p>
                    <p class="preco">R$ ${p.preco.toFixed(2)}</p>
                    <button class="btn-primary">Adicionar ao Carrinho</button>
                </div>
            `).join('');
        }
        carregarVitrine();
    </script>
</body>
</html>
