<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk's Coffee - PDV & Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-container">
            <h1 data-testid="app-title">☕ Milk's Coffee</h1>
        </div>
        <div class="search-bar">
            <input type="text" id="input-busca" placeholder="Buscar produto..." oninput="carregarProdutos(this.value)" data-testid="search-input">
        </div>
        <button id="btn-login-admin" onclick="toggleAdminView()" data-testid="login-admin-button">🔓 Admin</button>
    </header>

    <main class="container">
        
        <section id="area-admin" class="admin-panel hidden" data-testid="admin-section">
            <h2>🛠️ Gestão de Inventário</h2>
            <form id="form-cadastro" onsubmit="cadastrarProduto(event)" data-testid="product-form">
                <input type="hidden" id="edit-id">
                <div class="inputs-group">
                    <input type="text" id="novo-item" placeholder="Nome do Produto" required data-testid="input-name">
                    <input type="number" id="novo-preco" placeholder="Preço (0.00)" step="0.01" required data-testid="input-price">
                    <input type="number" id="nova-qtd" placeholder="Quantidade" required data-testid="input-stock">
                    
                    <select id="nova-cat" data-testid="select-category">
                        <option value="Café">Café</option>
                        <option value="Store">Loja (Canecas/Roupas)</option>
                        <option value="Insumo">Insumo Interno</option>
                    </select>

                    <select id="visivel-cliente" data-testid="select-visibility">
                        <option value="0">❌ Ocultar no App</option>
                        <option value="1">✅ Mostrar no App</option>
                    </select>

                    <input type="file" id="input-foto" accept="image/*" data-testid="input-file">
                </div>
                
                <div class="actions">
                    <button type="submit" id="btn-salvar" class="btn-success" data-testid="save-button">Salvar Produto</button>
                    <button type="button" id="btn-cancelar" class="hidden" onclick="resetarFormulario()" data-testid="cancel-button">Cancelar</button>
                </div>
            </form>
            <hr>
        </section>

        <div class="pdv-layout">
            
            <section class="produtos-section">
                <h2>Produtos</h2>
                <div id="grid-produtos" class="grid" data-testid="product-grid">
                    </div>
            </section>

            <aside class="carrinho-section" data-testid="cart-container">
                <h2>🛒 Carrinho</h2>
                <div id="lista-carrinho" data-testid="cart-list">
                    <p class="empty-msg">Carrinho vazio</p>
                </div>
                <div class="carrinho-total">
                    <strong>Total: R$ <span id="valor-total" data-testid="cart-total">0.00</span></strong>
                </div>
                <button onclick="finalizarVenda()" class="btn-primary" id="btn-checkout" data-testid="checkout-button">Finalizar Venda</button>
            </aside>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
